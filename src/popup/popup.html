<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fafafa;
    }
    h1 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #111;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-primary {
      background: #111;
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) {
      background: #333;
    }
    .btn-secondary {
      background: #6366f1;
      color: #fff;
      margin-top: 8px;
    }
    .btn-secondary:hover:not(:disabled) {
      background: #4f46e5;
    }
    .btn-tertiary {
      background: #059669;
      color: #fff;
      margin-top: 8px;
    }
    .btn-tertiary:hover:not(:disabled) {
      background: #047857;
    }
    .btn-pick {
      background: #d97706;
      color: #fff;
      margin-top: 8px;
    }
    .btn-pick:hover:not(:disabled) {
      background: #b45309;
    }
    .btn-screenshot {
      background: #7c3aed;
      color: #fff;
      margin-top: 8px;
    }
    .btn-screenshot:hover:not(:disabled) {
      background: #6d28d9;
    }
    .status {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.4;
      min-height: 20px;
      word-break: break-all;
    }
    .status.info { background: #eef2ff; color: #3b5998; }
    .status.success { background: #ecfdf5; color: #047857; }
    .status.error { background: #fef2f2; color: #b91c1c; }
  </style>
</head>
<body>
  <h1>PageGrab</h1>
  <button id="extract-btn" class="btn btn-primary">Extract Text</button>
  <button id="analyze-btn" class="btn btn-secondary">LP Analysis</button>
  <button id="design-system-btn" class="btn btn-tertiary">Design System</button>
  <button id="pick-component-btn" class="btn btn-pick">Pick Component</button>
  <button id="screenshot-btn" class="btn btn-screenshot">Full Screenshot</button>
  <div id="status" class="status info">Ready</div>
  <script src="popup.js"></script>
</body>
</html>
